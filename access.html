<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background: black;
      color: #00ff00;
      font-family: monospace;
      padding: 20px;
    }
  </style>
</head>
<body>

<p id="text"></p>

<script>
let msg = "ACCESS GRANTED...";
let i = 0;

function type() {
  if (i < msg.length) {
    document.getElementById("text").innerHTML += msg.charAt(i);
    i++;
    setTimeout(type, 80);
  }
}

type();
</script>

</body>
</html>
